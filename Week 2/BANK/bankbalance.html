<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank System</title>
    <link rel="stylesheet" href="bankbalance.css">
</head>
<body>

<div class="container">

    <h1>Bank System</h1>

    <h2 class="balance">
        Current Balance: Rs <span id="balance">10000</span>
    </h2>

    <input type="number" id="amount" placeholder="Enter amount">

    <div class="btn-group">
        <button class="withdraw" onclick="withdrawMoney()">Withdraw</button>
        <button class="deposit" onclick="depositMoney()">Deposit</button>
    </div>

    <p id="message"></p>

</div>

<script src="bankbalance.js"></script>
</body>
</html>
